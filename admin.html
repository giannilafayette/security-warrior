<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Security Warrior</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="favicon-192x192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:       #5B2D8E;
      --purple-mid:   #7B3FB5;
      --purple-light: #A96EDF;
      --purple-pale:  #EDE4F8;
      --white:        #FFFFFF;
      --off-white:    #F7F4FC;
      --gray:         #6B6B7B;
      --dark:         #12091E;
      --accent:       #C084FC;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(169,110,223,0.2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: .3rem;
    }
    .login-sub {
      font-size: 0.8rem;
      font-family: 'Space Mono', monospace;
      color: var(--gray);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .login-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
    .login-group label {
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray);
    }
    .login-group input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(169,110,223,0.25);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    .login-group input:focus { border-color: var(--purple-light); }
    .login-btn {
      width: 100%;
      background: var(--purple-mid);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .2s;
    }
    .login-btn:hover { background: var(--purple-light); }
    .login-error {
      color: #f87171;
      font-size: 0.82rem;
      margin-top: .8rem;
      display: none;
    }
    .login-error.visible { display: block; }

    /* ── DASHBOARD ── */
    .dashboard { display: none; min-height: 100vh; }
    .dashboard.visible { display: block; }

    .dash-header {
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(169,110,223,0.15);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dash-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .dash-meta {
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      color: var(--gray);
    }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(169,110,223,0.3);
      color: var(--purple-light);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .logout-btn:hover { background: var(--purple-mid); color: #fff; }

    .dash-body { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(169,110,223,0.15);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
    }
    .stat-label {
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: .4rem;
    }
    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .section-label {
      font-size: 0.68rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 1rem;
    }

    .quote-list { display: flex; flex-direction: column; gap: .75rem; }

    .quote-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(169,110,223,0.15);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .quote-card:hover { border-color: rgba(169,110,223,0.4); }

    .quote-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.4rem;
      cursor: pointer;
      gap: 1rem;
    }
    .quote-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--white);
    }
    .quote-email {
      font-size: 0.82rem;
      color: var(--purple-light);
    }
    .quote-date {
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--gray);
      flex-shrink: 0;
    }
    .quote-services {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      flex: 1;
    }
    .service-tag {
      background: rgba(91,45,142,0.3);
      border: 1px solid rgba(169,110,223,0.25);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--purple-light);
      letter-spacing: .5px;
    }
    .chevron {
      color: var(--gray);
      font-size: 0.8rem;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .quote-card.open .chevron { transform: rotate(180deg); }

    .quote-card-body {
      display: none;
      padding: 0 1.4rem 1.2rem;
      border-top: 1px solid rgba(169,110,223,0.1);
    }
    .quote-card.open .quote-card-body { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem 2rem;
      margin-top: 1rem;
    }
    .detail-item {}
    .detail-label {
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: .2rem;
    }
    .detail-value {
      font-size: 0.9rem;
      color: var(--white);
      line-height: 1.5;
    }
    .detail-value.desc {
      grid-column: 1 / -1;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: .8rem 1rem;
      font-size: 0.88rem;
      color: #ccc;
    }

    .card-actions { display: flex; gap: .6rem; margin-top: 1rem; flex-wrap: wrap; }
    .edit-btn {
      background: transparent;
      border: 1px solid rgba(169,110,223,0.35);
      color: var(--purple-light);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
    }
    .edit-btn:hover { background: rgba(123,63,181,0.2); }
    .save-btn {
      background: var(--purple-mid);
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
    }
    .save-btn:hover { background: var(--purple-light); }
    .cancel-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--gray);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .delete-btn {
      background: transparent;
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
    }
    .delete-btn:hover { background: rgba(248,113,113,0.15); }

    .edit-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(169,110,223,0.3);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
    }
    .edit-input:focus { border-color: var(--purple-light); }
    textarea.edit-input { resize: vertical; min-height: 80px; }

    /* ── ADD CUSTOMER MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #1a0f2e;
      border: 1px solid rgba(169,110,223,0.25);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
      margin-bottom: 1rem;
    }
    .modal-group { display: flex; flex-direction: column; gap: 5px; }
    .modal-group.full { grid-column: 1 / -1; }
    .modal-group label {
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray);
    }
    .modal-actions { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1.5rem; }
    .add-customer-btn {
      background: var(--purple-mid);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
    }
    .add-customer-btn:hover { background: var(--purple-light); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--gray);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--gray);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
      .dash-header { flex-wrap: wrap; gap: .8rem; }
      .quote-card-header { flex-wrap: wrap; }
      .modal-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">Security Warrior</div>
    <div class="login-sub">Admin Portal</div>
    <div class="login-group">
      <label for="adminEmail">Email</label>
      <input type="email" id="adminEmail" placeholder="admin@example.com" autocomplete="username"/>
    </div>
    <div class="login-group">
      <label for="adminPassword">Password</label>
      <input type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Invalid email or password.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-title">Quote Submissions</div>
      <div class="dash-meta" id="dashMeta">Loading…</div>
    </div>
    <div style="display:flex;gap:.6rem;align-items:center;">
      <button class="add-customer-btn" onclick="openAddModal()">+ Add Customer</button>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="dash-body">
    <div class="stats-row" id="statsRow"></div>
    <div class="section-label">All Submissions</div>
    <div class="quote-list" id="quoteList"><div class="loading">Loading submissions…</div></div>
  </div>
</div>

<!-- ADD CUSTOMER MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Add Customer</div>
    <div class="modal-grid">
      <div class="modal-group">
        <label>First Name *</label>
        <input class="edit-input" id="m-fname" placeholder="John"/>
      </div>
      <div class="modal-group">
        <label>Last Name *</label>
        <input class="edit-input" id="m-lname" placeholder="Doe"/>
      </div>
      <div class="modal-group">
        <label>Email *</label>
        <input class="edit-input" id="m-email" type="email" placeholder="john@example.com"/>
      </div>
      <div class="modal-group">
        <label>Phone</label>
        <input class="edit-input" id="m-phone" placeholder="(555) 000-0000"/>
      </div>
      <div class="modal-group full">
        <label>Address</label>
        <input class="edit-input" id="m-address" placeholder="123 Main St, City, State"/>
      </div>
      <div class="modal-group full">
        <label>Services (comma separated)</label>
        <input class="edit-input" id="m-services" placeholder="CCTV & Surveillance, Alarm Systems"/>
      </div>
      <div class="modal-group full">
        <label>Job Description</label>
        <textarea class="edit-input" id="m-description" placeholder="Describe the work needed…"></textarea>
      </div>
    </div>
    <div id="addModalError" style="color:#f87171;font-size:0.82rem;display:none;margin-top:.5rem;"></div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeAddModal()">Cancel</button>
      <button class="save-btn" onclick="saveNewCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  let sb;

  function initSupabase() {
    if (!sb) sb = window.supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);
    return sb;
  }

  async function doLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('visible');

    const { error } = await initSupabase().auth.signInWithPassword({ email, password });
    if (error) {
      errEl.classList.add('visible');
      return;
    }
    showDashboard();
  }

  async function doLogout() {
    await initSupabase().auth.signOut();
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('adminPassword').value = '';
  }

  async function showDashboard() {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    loadSubmissions();
  }

  async function loadSubmissions() {
    const { data, error } = await initSupabase()
      .from('customers')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('quoteList').innerHTML = '<div class="empty-state">Error loading submissions.</div>';
      return;
    }

    renderStats(data);
    renderQuotes(data);
  }

  function renderStats(data) {
    const total = data.length;
    const today = data.filter(r => new Date(r.created_at).toDateString() === new Date().toDateString()).length;
    const services = [...new Set(data.flatMap(r => r.services || []))];

    document.getElementById('dashMeta').textContent = `${total} total submission${total !== 1 ? 's' : ''}`;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Quotes</div><div class="stat-value">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value">${today}</div></div>
      <div class="stat-card"><div class="stat-label">Services Requested</div><div class="stat-value">${services.length}</div></div>
    `;
  }

  function renderQuotes(data) {
    const list = document.getElementById('quoteList');
    if (!data.length) {
      list.innerHTML = '<div class="empty-state">No submissions yet.</div>';
      return;
    }

    list.innerHTML = data.map(r => {
      const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const time = new Date(r.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const servicesTags = (r.services || []).map(s => `<span class="service-tag">${s}</span>`).join('');
      const gateTypes = (r.gate_types || []).join(', ') || '—';
      const servicesVal = (r.services || []).join(', ');

      return `
        <div class="quote-card" id="card-${r.id}">
          <div class="quote-card-header" onclick="toggleCard('${r.id}')">
            <div>
              <div class="quote-name">${r.first_name} ${r.last_name}</div>
              <div class="quote-email">${r.email}</div>
            </div>
            <div class="quote-services">${servicesTags}</div>
            <div class="quote-date">${date}<br/>${time}</div>
            <div class="chevron">▼</div>
          </div>
          <div class="quote-card-body">
            <!-- VIEW MODE -->
            <div id="view-${r.id}">
              <div class="detail-grid">
                <div class="detail-item">
                  <div class="detail-label">First Name</div>
                  <div class="detail-value">${r.first_name}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Last Name</div>
                  <div class="detail-value">${r.last_name}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Email</div>
                  <div class="detail-value">${r.email}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Phone</div>
                  <div class="detail-value">${r.phone || '—'}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Address</div>
                  <div class="detail-value">${r.address || '—'}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Gate Types</div>
                  <div class="detail-value">${gateTypes}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Services</div>
                  <div class="detail-value">${servicesVal || '—'}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Submitted</div>
                  <div class="detail-value">${date} at ${time}</div>
                </div>
                <div class="detail-item" style="grid-column:1/-1">
                  <div class="detail-label">Job Description</div>
                  <div class="detail-value desc">${r.description || '—'}</div>
                </div>
              </div>
              <div class="card-actions">
                <button class="edit-btn" onclick="startEdit('${r.id}')">Edit</button>
                <button class="delete-btn" onclick="deleteRecord('${r.id}')">Delete</button>
              </div>
            </div>
            <!-- EDIT MODE -->
            <div id="edit-${r.id}" style="display:none;">
              <div class="detail-grid" style="margin-top:1rem;">
                <div class="detail-item">
                  <div class="detail-label">First Name</div>
                  <input class="edit-input" id="e-fname-${r.id}" value="${r.first_name || ''}"/>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Last Name</div>
                  <input class="edit-input" id="e-lname-${r.id}" value="${r.last_name || ''}"/>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Email</div>
                  <input class="edit-input" id="e-email-${r.id}" value="${r.email || ''}"/>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Phone</div>
                  <input class="edit-input" id="e-phone-${r.id}" value="${r.phone || ''}"/>
                </div>
                <div class="detail-item" style="grid-column:1/-1">
                  <div class="detail-label">Address</div>
                  <input class="edit-input" id="e-address-${r.id}" value="${r.address || ''}"/>
                </div>
                <div class="detail-item" style="grid-column:1/-1">
                  <div class="detail-label">Services (comma separated)</div>
                  <input class="edit-input" id="e-services-${r.id}" value="${servicesVal}"/>
                </div>
                <div class="detail-item" style="grid-column:1/-1">
                  <div class="detail-label">Job Description</div>
                  <textarea class="edit-input" id="e-desc-${r.id}">${r.description || ''}</textarea>
                </div>
              </div>
              <div class="card-actions">
                <button class="save-btn" onclick="saveEdit('${r.id}')">Save</button>
                <button class="cancel-btn" onclick="cancelEdit('${r.id}')">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleCard(id) {
    document.getElementById('card-' + id).classList.toggle('open');
  }

  function startEdit(id) {
    document.getElementById('view-' + id).style.display = 'none';
    document.getElementById('edit-' + id).style.display = 'block';
  }

  function cancelEdit(id) {
    document.getElementById('edit-' + id).style.display = 'none';
    document.getElementById('view-' + id).style.display = 'block';
  }

  async function saveEdit(id) {
    const services = document.getElementById('e-services-' + id).value.split(',').map(s => s.trim()).filter(Boolean);
    const { error } = await initSupabase().from('customers').update({
      first_name:  document.getElementById('e-fname-' + id).value.trim(),
      last_name:   document.getElementById('e-lname-' + id).value.trim(),
      email:       document.getElementById('e-email-' + id).value.trim(),
      phone:       document.getElementById('e-phone-' + id).value.trim() || null,
      address:     document.getElementById('e-address-' + id).value.trim() || null,
      services,
      description: document.getElementById('e-desc-' + id).value.trim()
    }).eq('id', id);

    if (error) { alert('Save failed: ' + error.message); return; }
    loadSubmissions();
  }

  async function deleteRecord(id) {
    if (!confirm('Delete this submission? This cannot be undone.')) return;
    const { error } = await initSupabase().from('customers').delete().eq('id', id);
    if (error) { alert('Delete failed.'); return; }
    loadSubmissions();
  }

  function openAddModal() {
    ['m-fname','m-lname','m-email','m-phone','m-address','m-services','m-description'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('addModalError').style.display = 'none';
    document.getElementById('addModal').classList.add('visible');
  }

  function closeAddModal() {
    document.getElementById('addModal').classList.remove('visible');
  }

  async function saveNewCustomer() {
    const fname = document.getElementById('m-fname').value.trim();
    const lname = document.getElementById('m-lname').value.trim();
    const email = document.getElementById('m-email').value.trim();
    const errEl = document.getElementById('addModalError');

    if (!fname || !lname || !email) {
      errEl.textContent = 'First name, last name, and email are required.';
      errEl.style.display = 'block';
      return;
    }

    const services = document.getElementById('m-services').value.split(',').map(s => s.trim()).filter(Boolean);

    const { error } = await initSupabase().from('customers').insert({
      first_name:  fname,
      last_name:   lname,
      email,
      phone:       document.getElementById('m-phone').value.trim() || null,
      address:     document.getElementById('m-address').value.trim() || null,
      services,
      description: document.getElementById('m-description').value.trim() || null
    });

    if (error) { errEl.textContent = 'Error: ' + error.message; errEl.style.display = 'block'; return; }
    closeAddModal();
    loadSubmissions();
  }

  // Close modal on overlay click
  document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === document.getElementById('addModal')) closeAddModal();
  });

  // Auto-login if session exists
  initSupabase().auth.getSession().then(({ data }) => {
    if (data.session) showDashboard();
  });

  // Submit on Enter
  document.getElementById('adminPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
